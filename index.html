<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mon IA d'Échecs Wasm</title>
    <link rel="stylesheet" href="./chessboardjs/css/chessboard-0.3.0.min.css"/>
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="./chessboardjs/js/chessboard-0.3.0.min.js"></script>
</head>
<body>
    <h2>Échecs IA (C + WebAssembly)</h2>
    <div id="myBoard" style="width: 400px"></div>
    <p>Statut : <span id="status">Chargement du moteur...</span></p>

    <script src="echecs.js"></script>
    <script>
        var board = null;
        var engine = null;

        // Table de conversion pour envoyer le bon caractère au C
        const pieceMap = {
            'wP': 'P', 'wN': 'N', 'wB': 'B', 'wR': 'R', 'wQ': 'Q', 'wK': 'K',
            'bP': 'p', 'bN': 'n', 'bB': 'b', 'bR': 'r', 'bQ': 'q', 'bK': 'k'
        };

        // Initialisation correcte (Emscripten génère souvent une fonction nommée d'après le fichier ou utilise Module)
        Echecs().then(instance => {
            engine = instance;
            engine._initialiserPlateau();
            engine._initialiser_partie(0);
            
            document.getElementById('status').innerText = "Prêt à jouer !";
            
            var config = {
                draggable: true,
                position: 'start',
                onDrop: handleMove,
                pieceTheme: './chessboardjs/img/{piece}.png',
            };
            board = Chessboard('myBoard', config);
        });

        function handleMove(source, target, piece, newPos, oldPos, orientation) {
            let y1 = source.charCodeAt(0) - 97;
            let x1 = 8 - parseInt(source[1]);
            let y2 = target.charCodeAt(0) - 97;
            let x2 = 8 - parseInt(target[1]);

            // On récupère le caractère de la pièce ('P', 'n', etc.)
            let pChar = pieceMap[piece].charCodeAt(0);

            // Appeler le C : renvoie 1 si valide, 0 sinon
            let coupValide = engine._jouer_coup_web(x1, y1, x2, y2, pChar);

            if (coupValide === 0) {
                return 'snapback'; // Annule le mouvement sur l'interface
            }

            // Le coup est valide, l'IA a aussi joué côté C.
            // On récupère le FEN mis à jour (qui contient le coup de l'IA)
            let fen = engine.ccall('renvoyer_FEN', 'string');

            setTimeout(function() {
                board.position(fen); // Affiche la réponse de l'IA
            }, 250);
        }
    </script>
</body>
</html>
